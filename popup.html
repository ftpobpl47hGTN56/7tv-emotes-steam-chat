<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Steam 7TV Emotes</title>
<style>
  *  { 
        box-sizing: border-box; margin: 0; padding: 0;    
 }
        
  body {
    width: 340px;
    background: #1b2838;
    color: #c6d4df;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
     
 }
        
  header {
    background: linear-gradient(135deg, #1a3a5c, #0d1f2d);
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px;
     
 }
        
  header img { 
        width: 28px; height: 28px;    
 }
        
  header h1  { 
        font-size: 14px; font-weight: 700; color: #64d2ff;    
 }
        
  header p   { 
        font-size: 11px; color: rgba(198,212,223,0.5); margin-top: 2px;    
 }
        

  .section    { 
        padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);    
 }
        
  .section h2 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
    color: rgba(198,212,223,0.38); margin-bottom: 9px;
     
 }
        
  .hint  { 
        font-size: 11px; color: rgba(198,212,223,0.38); line-height: 1.6; margin-bottom: 9px;    
 }
        
  .hint code    { 
        background: rgba(255,255,255,0.08); border-radius: 3px; padding: 1px 5px; color: #8fc8e8; font-size: 10px;    
 }
        

  .row  { 
        display: flex; gap: 7px;    
 }
        
  input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 5px; color: #c6d4df; font-size: 12px;
    padding: 6px 9px; outline: none; transition: border-color 0.15s;
     
 }
        
  input:focus       { 
        border-color: #64d2ff;    
 }
        
  input.ok          { 
        border-color: #5cd65c;    
 }
        
  input.err         { 
        border-color: #ff6b6b;    
 }
        
  input::placeholder   { 
        color: rgba(198,212,223,0.25);    
 }
        

  button {
    background: #2a5a8c; border: none; border-radius: 5px;
    color: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
    padding: 6px 14px; white-space: nowrap; flex-shrink: 0;
    transition: background 0.15s;
     
 }
        
  button:hover   { 
        background: #3a6ea0;    
 }
        
  button.sm {
    background: rgba(200,50,50,0.2); border: 1px solid rgba(200,50,50,0.3);
    font-weight: 400; font-size: 11px; padding: 3px 9px;
     
 }
        
  button.sm:hover  { 
        background: rgba(200,50,50,0.4);    
 }
        

  #msg   { 
        min-height: 18px; margin-top: 7px; font-size: 11px;    
 }
        

  #set-list    { 
        list-style: none;    
 }
        
  #set-list li {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 5px;
    background: rgba(255,255,255,0.04); margin-bottom: 4px;
     
 }
        
  .li-id  { 
        flex: 1; font-size: 11px; font-family: monospace; color: rgba(198,212,223,0.55); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;    
 }
        
  .empty  { 
        font-size: 11px; color: rgba(198,212,223,0.28); font-style: italic;    
 }
        

  footer 
        { 
        padding: 8px 16px; font-size: 10px; color: rgba(198,212,223,0.25);    
 }
        
  footer a   { 
        color: #64d2ff; text-decoration: none;    
 }
      
 /* Информация о сете */
    .set-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0; /* для text-overflow */
    }

    .set-name {
      font-size: 14px;
      font-weight: 600;
      color: #64d2ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .set-id {
      font-size: 11px;
      color: rgba(198, 212, 223, 0.5);
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Обновленный стиль списка */
    #set-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 6px;
      transition: background 0.2s;
    }

    #set-list li:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Кнопка удаления */
    button.sm {
      flex-shrink: 0;
      min-width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 4px;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: #ff6b6b;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.sm:hover {
      background: rgba(255, 0, 0, 0.2);
      border-color: #ff6b6b;
    }

    /* Индикатор загрузки на кнопке */
    #btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    } 

</style>
</head>
<body>

<header>
  <img src="icons/icon48.png" alt="7TV" />
  <div>
    <h1>Steam Chat 7TV Emotes</h1>
    <p>Global 7TV emojis uploaded ✅</p>
  </div>
</header>

<div class="section">
  <h2>Add your own set</h2>
  <p class="hint">
    copy-paste a link to the user set ID:<br>
    <code>7tv.app/emote-sets/01JVJM…</code><br>
    <code>7tv.app/users/01JVJH…</code>
  </p>
  <div class="row">
    <input id="inp" type="text" placeholder="Link or ID emote set …" />
    <button id="btn">add set</button>
  </div>
  <div id="msg"></div>
</div>

<div class="section">
  <h2>Saved set's</h2>
  <ul id="set-list"></ul>
</div>

<footer>
  <a href="https://steamcommunity.com/chat" target="_blank">open  Steam chat </a>
  ·After adding it, reload the chat page.
</footer>

<script src="popup.js"></script>
</body>
</html>
